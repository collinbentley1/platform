name: Application

on:
  workflow_call:
    inputs:
      bun-version:
        description: Bun version passed to oven-sh/setup-bun.
        required: false
        type: string
        default: canary
      verify-command:
        description: Command that verifies the application.
        required: false
        type: string
        default: bun run verify
      install-command:
        description: Command that installs dependencies before verification.
        required: false
        type: string
        default: bun install --frozen-lockfile

permissions: {}

jobs:
  verify:
    name: Bun verify
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ inputs.bun-version }}

      - name: Install dependencies
        run: ${{ inputs.install-command }}

      - name: Verify app
        run: ${{ inputs.verify-command }}
